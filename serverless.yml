service: complianceflow-ains

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  timeout: 900 # 15 minutes max
  memorySize: 1024
  environment:
    # Set these in your AWS Lambda environment variables later, or securely via SSM
    GEMINI_API_KEY: ${env:GEMINI_API_KEY, ""}
    AWS_SES_FROM_EMAIL: ${env:AWS_SES_FROM_EMAIL, ""}
    # Note: PLATFORM_AWS_ACCESS_KEY_ID is no longer needed in .env! 
    # AWS Lambda uses the IAM Role below natively.

  iam:
    role:
      statements:
        - Effect: "Allow"
          Action:
            - "sts:AssumeRole"
          Resource: "arn:aws:iam::*:role/ComplianceFlow-*" # Restricted to roles created via our CFN template
        - Effect: "Allow"
          Action:
            - "ses:SendEmail"
            - "ses:SendRawEmail"
          Resource: "*"
        - Effect: "Allow"
          Action:
            - "dynamodb:Query"
            - "dynamodb:Scan"
            - "dynamodb:GetItem"
            - "dynamodb:PutItem"
            - "dynamodb:UpdateItem"
          Resource:
            - "arn:aws:dynamodb:${opt:region, 'us-east-1'}:*:table/ComplianceFlowClients"

resources:
  Resources:
    ClientsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ComplianceFlowClients
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

        - Effect: "Allow"
          Action:
            - "sqs:SendMessage"
            - "sqs:ReceiveMessage"
            - "sqs:DeleteMessage"
            - "sqs:GetQueueAttributes"
          Resource:
            - !GetAtt ScanQueue.Arn

resources:
  Resources:
    ClientsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ComplianceFlowClients
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    AuditTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ComplianceFlowAudit
        AttributeDefinitions:
          - AttributeName: clientId
            AttributeType: S
          - AttributeName: timestamp
            AttributeType: S
        KeySchema:
          - AttributeName: clientId
            KeyType: HASH
          - AttributeName: timestamp
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST

    ScanQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ComplianceFlowScanQueue
        VisibilityTimeout: 900 # Matches Lambda timeout

package:
  patterns:
    - "!node_modules/@aws-sdk/**"
    - "!node_modules/.cache/**"
    - "!.git/**"
    - "!.env"

functions:
  scheduler:
    handler: scheduler.handler
    environment:
      SCAN_QUEUE_URL: !Ref ScanQueue
    events:
      - schedule: cron(0 12 ? * MON-FRI *) # Every weekday at 12:00 UTC
      - http:
          path: /api/trigger
          method: post

  tenants:
    handler: api/tenants.handler
    events:
      - http:
          path: /api/tenants
          method: get
      - http:
          path: /api/tenants
          method: post
      - http:
          path: /api/tenants/toggle
          method: post

  worker:
    handler: worker.handler
    timeout: 900
    events:
      - sqs:
          arn: !GetAtt ScanQueue.Arn
          batchSize: 1
