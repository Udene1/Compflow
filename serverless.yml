service: comp-flow-ains

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  timeout: 900 # 15 minutes max
  memorySize: 1024
  environment:
    # Set these in your AWS Lambda environment variables later, or securely via SSM
    GEMINI_API_KEY: ${env:GEMINI_API_KEY, ""}
    AWS_SES_FROM_EMAIL: ${env:AWS_SES_FROM_EMAIL, ""}
    # Note: PLATFORM_AWS_ACCESS_KEY_ID is no longer needed in .env! 
    # AWS Lambda uses the IAM Role below natively.

  iam:
    role:
      statements:
        - Effect: "Allow"
          Action:
            - "sts:AssumeRole"
          Resource: "arn:aws:iam::*:role/ComplianceFlow-*" 
        - Effect: "Allow"
          Action:
            - "ses:SendEmail"
            - "ses:SendRawEmail"
          Resource: "*"
        - Effect: "Allow"
          Action:
            - "dynamodb:Query"
            - "dynamodb:Scan"
            - "dynamodb:GetItem"
            - "dynamodb:PutItem"
            - "dynamodb:UpdateItem"
          Resource:
            - "arn:aws:dynamodb:${opt:region, 'us-east-1'}:*:table/CompFlowClientsTable"
            - "arn:aws:dynamodb:${opt:region, 'us-east-1'}:*:table/CompFlowAuditTable"
        - Effect: "Allow"
          Action:
            - "sqs:SendMessage"
            - "sqs:ReceiveMessage"
            - "sqs:DeleteMessage"
            - "sqs:GetQueueAttributes"
          Resource:
            - !GetAtt ScanQueue.Arn

resources:
  Resources:
    # ─── DATABASE ───
    ClientsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: CompFlowClientsTable
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    AuditTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: CompFlowAuditTable
        AttributeDefinitions:
          - AttributeName: clientId
            AttributeType: S
          - AttributeName: timestamp
            AttributeType: S
        KeySchema:
          - AttributeName: clientId
            KeyType: HASH
          - AttributeName: timestamp
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST

    # ─── QUEUE ───
    ScanQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: CompFlowScanQueue
        VisibilityTimeout: 900
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt ScanDLQ.Arn
          maxReceiveCount: 3

    ScanDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: CompFlowScanDLQ

functions:
  scheduler:
    handler: scheduler.handler
    environment:
      SCAN_QUEUE_URL: !Ref ScanQueue
    events:
      - schedule: cron(0 12 ? * MON-FRI *)
      - http:
          path: /api/trigger
          method: post
          cors: true

  tenants:
    handler: api/tenants.handler
    events:
      - http:
          path: /api/tenants
          method: get
          cors: true
      - http:
          path: /api/tenants
          method: post
          cors: true
      - http:
          path: /api/tenants/toggle
          method: post
          cors: true

  worker:
    handler: worker.handler
    timeout: 900
    events:
      - sqs:
          arn: !GetAtt ScanQueue.Arn
          batchSize: 1

  scan:
    handler: api/lambda-scan.handler
    timeout: 900
    events:
      - http:
          path: /api/scan
          method: post
          cors: true

  validate:
    handler: api/validate.handler
    events:
      - http:
          path: /api/validate
          method: post
          cors: true
